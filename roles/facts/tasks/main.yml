---

- name: Add facts is_raspbian and is_rpios
  set_fact:
    cacheable: true
    is_raspbian: '{{ ansible_facts["lsb"].id == "Raspbian" }}'
    is_rpios: '{{ ansible_facts["lsb"].id == "Debian" and ansible_facts["architecture"] == "aarch64" }}'

- name: Add other facts
  set_fact:
    cacheable: true
    is_debian: '{{ ansible_facts["lsb"].id == "Debian" and not is_rpios }}'
    is_rpi: '{{ is_rpios or is_raspbian }}'
    is_ubuntu: '{{ ansible_facts["lsb"].id == "Ubuntu" }}'
