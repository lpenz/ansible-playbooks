---
- hosts: all
  roles: [facts]
  tasks:
    - debug:
        msg: '{{ ansible_facts }}'
    - debug:
        msg: '{{ item.name }}: {{ item.value }}'
      loop:
        - {name: is_raspbian, value: '{{ is_raspbian }}'}
        - {name: is_rpios, value: '{{ is_rpios }}'}
        - {name: is_debian, value: '{{ is_debian }}'}
        - {name: is_rpi, value: '{{ is_rpi }}'}
